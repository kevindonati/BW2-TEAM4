<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spotify-Login</title>
    <link
      rel="icon"
      type="image/png"
      href="./assets/imgs/Spotify_Primary_Logo_RGB_Green_favicon.png"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
      integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./assets/style/footer.css" />
    <link rel="stylesheet" href="./assets/style/login.css" />
    <!-- Libreria esterna per cambiare il colore della section centrale -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
  </head>
  <body>
    <main class="container">
      <div class="login-card mx-auto text-center">
        <div class="mb-4">
          <i class="bi bi-spotify text-white" style="font-size: 3rem"></i>
        </div>

        <h1 class="h3 mb-4 fw-bold text-white">Accedi a Spotify</h1>

        <form action="index.html" method="GET">
          <div class="text-start mb-3">
            <label class="form-label fw-bold small">Email o nome utente</label>
            <input
              type="text"
              class="form-control"
              placeholder="Email o nome utente"
              required
            />
          </div>

          <div class="text-start mb-4">
            <label class="form-label fw-bold small">Password</label>
            <input
              type="password"
              class="form-control"
              placeholder="Password"
              required
            />
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-spotify">Accedi</button>
          </div>
        </form>

        <div class="mt-4">
          <a href="#" class="text-white small">Password dimenticata?</a>
          <hr class="text-secondary my-4" />
          <p class="text-secondary small">
            Non hai un account?
            <a href="#" class="text-white fw-bold">Iscriviti a Spotify</a>
          </p>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
