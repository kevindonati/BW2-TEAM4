<!doctype html>

    <main>

            <i
              class="d-flex align-items-center justify-content-between text-inattivo fs-2 bi bi-heart"

            href="./cerca.html"
            class="small d-flex flex-column align-items-center justify-content-center text-decoration-none text-inattivo"

          <a

      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
