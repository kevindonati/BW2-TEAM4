<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <title>Cerca-Mobile</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="icon"
      type="image/png"
      href="./assets/imgs/Spotify_Primary_Logo_RGB_Green_favicon.png"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
      integrity="sha512-1ycn6IcaQQ40/MKBW2W4Rhis/DbILU74C1vSrLJxCq57o941Ym01SwNsOMqvEBFlcgUa6xLiPY/NS5R+E6ztJQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="./assets/style/cerca.css" />
    <link rel="stylesheet" href="./assets/style/style.css" />
    <link rel="stylesheet" href="./assets/style/footer.css" />
  </head>

  <body class="p-3 text-white bg-grigio-scuro">
    <header>
      <h1 class="my-4 fw-bold">Cerca</h1>
      <div class="position-relative">
        <form
          class="bg-grigio m-1 p-2 rounded-2 d-flex align-items-center my-4"
          role="search"
          id="seachForm"
        >
          <i class="fas fa-search text-white"></i>
          <input
            placeholder="Cosa vuoi ascoltare?"
            id="searchInput"
            class="form-control me-2 bg-transparent text-decoration-none border-0 shadow-none w-100"
            type="search"
            aria-label="Search"
            autocomplete="off"
          />
        </form>
        <div
          id="searchResults"
          class="dropdown-menu bg-dark p-2 w-100 shadow-lg border border-secondary"
          style="
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            max-height: 400px;
            overflow-y: auto;
            z-index: 1000;
          "
        ></div>
      </div>
    </header>
    <main>
      <section class="text-center">
        <h3>Sfoglia tutto</h3>
        <div id="grid-container" class="row row-cols-2 row-cols-md-3 g-4"></div>
      </section>
    </main>
    <footer class="fixed-bottom">
      <section id="mobile-bottom">
        <article
          id="mobile-player"
          class="bg-grigio d-flex justify-content-between align-items-center mx-2 rounded-2 p-2"
        >
          <div class="">
            <audio src=""></audio>
            <img src="https://placecats.com/40/40" alt="" />
            <span>Testo canzone</span>
          </div>
          <div class="d-flex align-items-center justify-content-between gap-3">
            <i
              class="d-flex align-items-center justify-content-between text-inattivo fs-2 bi bi-pc-display"
            ></i>
            <i
              class="d-flex align-items-center justify-content-between text-inattivo fs-2 bi bi-heart"
            ></i>
            <i
              class="d-flex align-items-center justify-content-between text-inattivo fs-1 bi bi-play-fill"
            ></i>
          </div>
        </article>
        <article id="mobile-nav" class="d-flex">
          <a
            href="./index.html"
            class="small d-flex flex-column align-items-center justify-content-center text-decoration-none text-inattivo"
            ><i class="fas fa-home fs-1"></i>Home</a
          >

          <a
            href="./cerca.html"
            class="small d-flex flex-column align-items-center justify-content-center text-decoration-none text-inattivo"
          >
            <i class="fas fa-search fs-1"></i>Cerca</a
          >
          <a
            href=""
            class="small d-flex flex-column align-items-center justify-content-center text-decoration-none text-inattivo"
            ><i class="bi bi-bookshelf fs-1"></i>La tua libreria</a
          >
        </article>
      </section>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./assets/script/searchMobile.js"></script>
    <script src="./assets/script/script.js"></script>
  </body>
</html>
